services:
  nginx:
    image: nginx:alpine
    container_name: nginx-cache
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - nginx-api

  nginx-api:
    image: node:20-alpine
    container_name: nginx-api
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && node nginx.js"
    ports:
      - "4000:4000"

volumes:
  nginx_cache:
